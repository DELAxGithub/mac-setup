<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    .control {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
    }

    input[type="range"] {
      width: 100%;
    }

    .slider-value {
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    .status {
      text-align: center;
      color: #999;
      font-size: 11px;
      margin-bottom: 10px;
      min-height: 16px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    #startBtn {
      flex: 1;
      background: #4CAF50;
      color: white;
    }

    #startBtn:hover {
      background: #45a049;
    }

    #startBtn.active {
      background: #f44336;
    }

    #startBtn.active:hover {
      background: #da190b;
    }

    .nav-btn {
      background: #eee;
      color: #333;
      width: 40px;
    }

    .nav-btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <h3>Image Viewer</h3>
  <div class="control">
    <label>間隔（秒）</label>
    <input type="range" id="intervalSlider" min="0.5" max="15" step="0.5" value="2">
    <div class="slider-value"><span id="intervalValue">2</span> 秒ごと</div>
  </div>
  <div class="status" id="status"></div>
  <div class="btn-row">
    <button class="nav-btn" id="prevBtn">◀</button>
    <button id="startBtn">開始</button>
    <button class="nav-btn" id="nextBtn">▶</button>
  </div>
  <script src="popup.js"></script>
</body>

</html>
